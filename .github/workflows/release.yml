name: Release

# Runs whenever a version tag is pushed (a "release"), e.g. v0.1.0 or 1.2.3.
on:
  push:
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    # The app is a macOS bundle (Diktovani.app), so it must be built on macOS.
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so we can list commits since the previous tag.
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build application bundle
        run: ./release.sh

      - name: Package application bundle
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="Diktovani-${VERSION}-macos.zip"
          # -y preserves symlinks inside the .app bundle.
          ditto -c -k --sequesterRsrc --keepParent "Diktovani.app" "$ARCHIVE"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          CURRENT="${GITHUB_REF_NAME}"
          # Previous tag reachable from this one, if any.
          PREV="$(git describe --tags --abbrev=0 "${CURRENT}^" 2>/dev/null || true)"
          {
            if [ -n "$PREV" ]; then
              RANGE="${PREV}..${CURRENT}"
            else
              RANGE="${CURRENT}"
            fi
            # One line per commit. GitHub auto-links any "#123" reference to the
            # matching PR/issue; commits without one stay plain text.
            git log --no-merges --pretty=format:'- %s' "$RANGE"
            echo ""
            echo ""
            echo "The Diktovani.app file is not signed. To run a file downloaded from internet, run \`xattr -rd com.apple.quarantine Diktovani.app\`."
          } > RELEASE_NOTES.md

      - name: Create GitHub release and upload artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.archive }}
          body_path: RELEASE_NOTES.md
