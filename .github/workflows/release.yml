name: Create release for Diktovani.app

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Bump version'
        required: true
        default: minor
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Bump version
        id: version
        run: |
          CURRENT="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          sed -i '' "s/^version = \"${CURRENT}\"/version = \"${NEW}\"/" Cargo.toml
          cargo update --workspace
          echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD "${{ steps.version.outputs.tag }}"

      - name: Build application bundle
        run: ./release.sh

      - name: Package application bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent "Diktovani.app" "Diktovani.app.zip"

      - name: Generate release notes
        run: |
          CURRENT="${{ steps.version.outputs.tag }}"
          PREV="$(git describe --tags --abbrev=0 "${CURRENT}^" 2>/dev/null || true)"
          if [ -n "$PREV" ]; then
            RANGE="${PREV}..${CURRENT}^"
          else
            RANGE="${CURRENT}^"
          fi
          {
            git log --no-merges --pretty=format:'- %s' "$RANGE"
            echo ""
            echo " "
            echo ""
            echo "The Diktovani.app file is not signed. To run a file downloaded from internet, run \`xattr -rd com.apple.quarantine Diktovani.app\`."
            echo ""
            if [ -n "$PREV" ]; then
              echo "**Full Changelog**: https://github.com/zbycz/vibecoded-diktovani/compare/${PREV}...${CURRENT}"
            fi
          } > RELEASE_NOTES.md

      - name: Create GitHub release and upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: Diktovani.app.zip
          body_path: RELEASE_NOTES.md
